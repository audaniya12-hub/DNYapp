<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0A0A12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DNY"/>
<link id="pwa-icon" rel="apple-touch-icon"/>
<title>DNY</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;overflow:hidden;}
body{background:#0A0A12;color:#FFFFFF;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
::-webkit-scrollbar{display:none;}
textarea,input{caret-color:#9B5CFF;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
textarea::placeholder,input::placeholder{color:#3A3A4A;}
@keyframes pulse-ring{
  0%{opacity:0.6;transform:rotate(-90deg) scale(1);}
  50%{opacity:1;transform:rotate(-90deg) scale(1.01);}
  100%{opacity:0.6;transform:rotate(-90deg) scale(1);}
}
@keyframes pulse-glow{
  0%{box-shadow:0 0 20px rgba(155,92,255,0.3),0 0 0 1px rgba(155,92,255,0.15);}
  50%{box-shadow:0 0 40px rgba(155,92,255,0.5),0 0 0 1px rgba(155,92,255,0.3);}
  100%{box-shadow:0 0 20px rgba(155,92,255,0.3),0 0 0 1px rgba(155,92,255,0.15);}
}
@keyframes shimmer{
  0%{opacity:0.5;}50%{opacity:1;}100%{opacity:0.5;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// Premium minimal SVG icon
(function(){
  try{
    const s=`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0E0E1C"/>
          <stop offset="100%" stop-color="#07070F"/>
        </linearGradient>
        <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(155,92,255,0.4)"/>
          <stop offset="100%" stop-color="rgba(77,159,255,0.1)"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="110" fill="url(#bg)"/>
      <rect x="1.5" y="1.5" width="509" height="509" rx="109" fill="none" stroke="url(#border)" stroke-width="1.5"/>
      <text x="256" y="308" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="188" font-weight="700" letter-spacing="-4" text-anchor="middle" fill="white">DNY</text>
      <line x1="160" y1="344" x2="352" y2="344" stroke="rgba(155,92,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`;
    const b=new Blob([s],{type:'image/svg+xml'});
    const u=URL.createObjectURL(b);
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=c.height=512;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,512,512);
      URL.revokeObjectURL(u);
      const d=c.toDataURL('image/png');
      document.getElementById('pwa-icon').href=d;
      const f=document.createElement('link');f.rel='icon';f.type='image/png';f.href=d;
      document.head.appendChild(f);
    };img.src=u;
  }catch(e){}
})();
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useCallback,useEffect,useRef}=React;

// ── Design tokens ─────────────────────────────────────────────────
const T={
  // Backgrounds
  bg:      '#0A0A12',
  bg1:     '#0D0D18',
  bg2:     '#0F0F1C',
  // Glass cards
  glass:   'rgba(255,255,255,0.04)',
  glassHi: 'rgba(255,255,255,0.07)',
  glassBd: 'rgba(255,255,255,0.08)',
  // Accent — glow reserved for these ONLY
  sapphire:'#4D9FFF',
  violet:  '#9B5CFF',
  green:   '#1FD4A0',
  gold:    '#E9A832',
  // Text
  t1:      '#FFFFFF',
  t2:      '#8E8E93',
  t3:      '#48485A',
  // Faint tints
  vF:      'rgba(155,92,255,0.10)',
  vB:      'rgba(155,92,255,0.22)',
  sF:      'rgba(77,159,255,0.10)',
  sB:      'rgba(77,159,255,0.22)',
  gF:      'rgba(31,212,160,0.10)',
  gB:      'rgba(31,212,160,0.22)',
  goF:     'rgba(233,168,50,0.10)',
  goB:     'rgba(233,168,50,0.22)',
};
const F="'Plus Jakarta Sans',system-ui,sans-serif";

// ── Storage ────────────────────────────────────────────────────────
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const todayStr=()=>new Date().toDateString();
const getDOW=()=>new Date().getDay();
const ystStr=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toDateString();};

// ── Habits ─────────────────────────────────────────────────────────
const HABITS={
  faith:[
    {id:'fajr',    label:'Fajr Prayer',        note:'Dawn',           days:null},
    {id:'adhkar_m',label:'Morning Adhkar',      note:'After Fajr',    days:null},
    {id:'dhuhr',   label:'Dhuhr Prayer',        note:'Midday',        days:null},
    {id:'asr',     label:'Asr Prayer',          note:'Afternoon',     days:null},
    {id:'maghrib', label:'Maghrib Prayer',      note:'Sunset',        days:null},
    {id:'adhkar_e',label:'Evening Adhkar',      note:'After Maghrib', days:null},
    {id:'isha',    label:'Isha Prayer',         note:'Night',         days:null},
    {id:'quran',   label:'Read Quran',          note:'30 min',        days:null},
    {id:'mulk',    label:'Surah Al-Mulk',       note:'Before sleep',  days:null},
  ],
  study:[
    {id:'am',      label:'Morning Study Block', note:'1 hour',        days:null},
    {id:'nr',      label:'Night Review',        note:'1 hour',        days:null},
    {id:'rd',      label:'Read 5 Pages',        note:'Daily',         days:null},
  ],
  body:[
    {id:'wk',      label:'Workout',             note:'4×/week',       days:null},
    {id:'wt',      label:'Drink 2L Water',      note:'Daily',         days:null},
    {id:'sl',      label:'Sleep by 11 PM',      note:'7–8 hrs',       days:null},
    {id:'sk',      label:'Skincare Routine',    note:'AM + PM',       days:null},
  ],
  mind:[
    {id:'md',      label:'Meditation',          note:'10 min',        days:null},
    {id:'jn',      label:'Daily Journal',       note:'Evening',       days:null},
    {id:'gr',      label:'Gratitude Practice',  note:'3 things',      days:null},
  ],
  life:[
    {id:'cs',      label:'Cold Shower',         note:'Morning',       days:null},
    {id:'cl',      label:'Clean Space',         note:'Daily',         days:null},
    {id:'pl',      label:'Plan Tomorrow',       note:'Before sleep',  days:null},
    {id:'np',      label:'No Phone First 30m',  note:'After waking',  days:null},
    {id:'wash',    label:'Wash Clothes',        note:'Saturday only', days:[6]},
    {id:'iron',    label:'Iron Clothes',        note:'Sunday only',   days:[0]},
  ],
};
const META={
  faith:{label:'Faith & Spirit',  icon:'🕌', color:T.violet,  faint:T.vF, border:T.vB},
  study:{label:'Mind & Study',    icon:'📚', color:T.sapphire,faint:T.sF, border:T.sB},
  body: {label:'Body & Health',   icon:'💪', color:T.green,   faint:T.gF, border:T.gB},
  mind: {label:'Mental Wellness', icon:'🧘', color:'#A78BFA', faint:'rgba(167,139,250,0.10)', border:'rgba(167,139,250,0.25)'},
  life: {label:'Life & Discipline',icon:'✅',color:T.gold,    faint:T.goF,border:T.goB},
};
const mkCats=ps=>{
  const dow=getDOW();
  return ps.map(p=>({id:p,...META[p],habits:HABITS[p].filter(h=>!h.days||h.days.includes(dow)).map(h=>({...h,done:false}))}));
};
const LEVELS=[
  {n:1,t:'Beginner',xp:0},{n:2,t:'Committed',xp:100},{n:3,t:'Consistent',xp:300},
  {n:4,t:'Disciplined',xp:600},{n:5,t:'Focused',xp:1000},{n:6,t:'Elite',xp:1500},
  {n:7,t:'Warrior',xp:2200},{n:8,t:'Unstoppable',xp:3000},{n:9,t:'Legendary',xp:4000},
  {n:10,t:'Master',xp:5500},
];
const getLv=xp=>{let lv=LEVELS[0];for(const l of LEVELS){if(xp>=l.xp)lv=l;}const i=LEVELS.indexOf(lv),nx=LEVELS[i+1];return{...lv,nxp:nx?nx.xp:lv.xp+2000,nt:nx?.t};};

// ── Day processing ─────────────────────────────────────────────────
function processNewDay(){
  const last=ld('dny_lastdate2',''),today=todayStr();
  if(!last||last===today)return false;
  const streak=ld('dny_str2',0),scores=ld('dny_s2',[]),days=ld('dny_days2',0),lastScore=ld('dny_lastscore2',0);
  const newStreak=last===ystStr()?(lastScore>=50?streak+1:0):0;
  const newScores=[...scores,lastScore].slice(-60);
  const newDays=days+1;
  sv('dny_str2',newStreak);sv('dny_s2',newScores);sv('dny_days2',newDays);
  sv('dny_lastdate2',today);sv('dny_lastscore2',0);sv('dny_jd2',false);
  return{newStreak,newScores,newDays};
}

// ── Glass card component ───────────────────────────────────────────
function GlassCard({children,style={},glow,glowColor=T.violet}){
  return(
    <div style={{
      background:T.glass,
      backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',
      border:`1px solid ${T.glassBd}`,
      borderRadius:20,
      ...(glow?{boxShadow:`0 0 0 1px ${glowColor}44, 0 8px 32px ${glowColor}18`}:{}),
      ...style,
    }}>{children}</div>
  );
}

// ── Progress Ring with glow ────────────────────────────────────────
function Ring({pct,size=110,sw=8,color=T.violet,glow=false,pulse=false}){
  const r=(size-sw)/2,c=2*Math.PI*r;
  return(
    <svg width={size} height={size}
      style={{transform:'rotate(-90deg)',flexShrink:0,
        ...(glow?{filter:`drop-shadow(0 0 8px ${color}CC)`}:{}),
        ...(pulse?{animation:'pulse-ring 2.5s ease-in-out infinite'}:{}),
      }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round"
        style={{transition:'stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)'}}/>
    </svg>
  );
}

// ── TODAY SCREEN ──────────────────────────────────────────────────
function TodayScreen({cats,onToggle,name,streak,journalDone}){
  const[open,setOpen]=useState(null);
  const all=cats.flatMap(c=>c.habits),done=all.filter(h=>h.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const ringColor=pct>=80?T.gold:pct>=50?T.sapphire:T.violet;
  const h=new Date().getHours();
  const gr=h<5?'Good Night':h<12?'Good Morning':h<17?'Good Afternoon':'Good Evening';
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const fn=name.trim().split(' ')[0];
  const msg=pct===100?'Flawless execution today.':pct>=80?'Excellent discipline.':pct>=50?'Strong effort. Keep pushing.':'Rise. Your discipline is waiting.';

  return(<div style={{flex:1,overflowY:'auto',padding:'0 16px 100px'}}>
    {/* Header */}
    <div style={{padding:'20px 0 16px'}}>
      <div style={{fontSize:11,fontWeight:500,color:T.t3,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:6}}>{today}</div>
      <div style={{fontSize:28,fontWeight:800,color:T.t1,letterSpacing:'-0.5px',lineHeight:1.1}}>{gr},<br/>{fn}</div>
    </div>

    {/* Main Score Card */}
    <GlassCard glow glowColor={ringColor} style={{padding:20,marginBottom:14,display:'flex',alignItems:'center',gap:18}}>
      <div style={{position:'relative',flexShrink:0}}>
        <Ring pct={pct} size={112} sw={8} color={ringColor} glow={pct>0} pulse={pct===100}/>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:30,fontWeight:800,color:ringColor,lineHeight:1,letterSpacing:'-1px'}}>{pct}%</div>
          <div style={{fontSize:10,fontWeight:500,color:T.t3,marginTop:2,letterSpacing:'0.05em'}}>DONE</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:700,color:T.t1,marginBottom:4,letterSpacing:'-0.2px'}}>Discipline Score</div>
        <div style={{fontSize:12,fontWeight:400,color:T.t2,lineHeight:1.6,marginBottom:14}}>{msg}</div>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,
          background:T.goF,border:`1px solid ${T.goB}`,
          padding:'5px 12px',borderRadius:100}}>
          <span style={{fontSize:13}}>🔥</span>
          <span style={{fontSize:12,fontWeight:700,color:T.gold}}>
            {streak===0?'Start Your Streak':`${streak} Day Streak`}
          </span>
        </div>
      </div>
    </GlassCard>

    {/* Stats row */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
      {[
        {label:'Done',   val:`${done}/${all.length}`, color:ringColor},
        {label:'Streak', val:streak===0?'Day 1':`${streak}d`, color:T.gold},
        {label:'Score',  val:`${pct}%`, color:ringColor},
      ].map(s=>(
        <GlassCard key={s.label} style={{padding:'14px 10px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:s.color,letterSpacing:'-0.5px'}}>{s.val}</div>
          <div style={{fontSize:10,fontWeight:500,color:T.t3,marginTop:4,letterSpacing:'0.06em',textTransform:'uppercase'}}>{s.label}</div>
        </GlassCard>
      ))}
    </div>

    {/* Journal card */}
    <GlassCard glow={journalDone} glowColor={T.violet}
      style={{padding:'13px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,
        border:`1px solid ${journalDone?T.vB:T.glassBd}`,transition:'all 0.4s'}}>
      <div style={{width:38,height:38,borderRadius:12,
        background:journalDone?T.vF:'rgba(255,255,255,0.04)',
        border:`1px solid ${journalDone?T.vB:T.glassBd}`,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0,transition:'all 0.3s'}}>
        {journalDone?'✓':'📓'}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,color:journalDone?T.violet:T.t1}}>
          {journalDone?'Reflection Complete':'Evening Reflection'}
        </div>
        <div style={{fontSize:11,fontWeight:400,color:T.t3,marginTop:2}}>
          {journalDone?'You reflected today — well done.':'Write in your journal before sleep'}
        </div>
      </div>
      {!journalDone&&<div style={{fontSize:11,color:T.t3}}>Pending</div>}
    </GlassCard>

    {/* Section label */}
    <div style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:10}}>
      Today's Checklist
    </div>

    {/* Categories */}
    {cats.map(cat=>{
      const cd=cat.habits.filter(h=>h.done).length,io=open===cat.id;
      return(
        <GlassCard key={cat.id} style={{marginBottom:10,overflow:'hidden',
          border:`1px solid ${io?cat.border:T.glassBd}`,transition:'border-color 0.3s'}}>
          <div onClick={()=>setOpen(io?null:cat.id)}
            style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',cursor:'pointer'}}>
            <span style={{fontSize:17}}>{cat.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:cat.color,letterSpacing:'0.08em',textTransform:'uppercase'}}>{cat.label}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:44,height:3,background:'rgba(255,255,255,0.05)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:2,background:cat.color,
                  width:`${cat.habits.length?cd/cat.habits.length*100:0}%`,
                  boxShadow:`0 0 6px ${cat.color}80`,transition:'width 0.4s'}}/>
              </div>
              <span style={{fontSize:11,fontWeight:600,color:cd===cat.habits.length&&cat.habits.length?cat.color:T.t3,minWidth:26}}>{cd}/{cat.habits.length}</span>
              <span style={{color:T.t3,fontSize:13,display:'inline-block',transform:`rotate(${io?90:0}deg)`,transition:'transform 0.2s'}}>›</span>
            </div>
          </div>
          {io&&<div style={{borderTop:'1px solid rgba(255,255,255,0.05)'}}>
            {cat.habits.map((h,i)=>(
              <div key={h.id} onClick={()=>onToggle(cat.id,h.id)}
                style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',cursor:'pointer',
                  borderBottom:i<cat.habits.length-1?'1px solid rgba(255,255,255,0.04)':'none',
                  background:h.done?`${cat.color}06`:'transparent',transition:'background 0.2s'}}>
                <div style={{width:22,height:22,borderRadius:7,flexShrink:0,transition:'all 0.2s',
                  border:h.done?'none':'1px solid rgba(255,255,255,0.14)',
                  background:h.done?cat.color:'transparent',
                  boxShadow:h.done?`0 0 8px ${cat.color}80`:'none',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {h.done&&<svg width="11" height="8" viewBox="0 0 11 8"><path d="M1 4L4 7 10 1" fill="none" stroke="#0A0A12" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:500,
                    color:h.done?T.t3:T.t1,
                    textDecoration:h.done?'line-through':'none',transition:'all 0.2s'}}>{h.label}</div>
                  {h.note&&<div style={{fontSize:11,color:T.t3,marginTop:1}}>{h.note}</div>}
                </div>
                {h.done&&<div style={{fontSize:11,fontWeight:600,color:cat.color}}>✓</div>}
              </div>
            ))}
          </div>}
          {!io&&cd>0&&<div style={{padding:'0 16px 12px',display:'flex',gap:4}}>
            {cat.habits.slice(0,10).map(h=>(
              <div key={h.id} style={{width:7,height:7,borderRadius:3.5,
                background:h.done?cat.color:'rgba(255,255,255,0.06)',
                boxShadow:h.done?`0 0 4px ${cat.color}80`:'none',transition:'all 0.2s'}}/>
            ))}
          </div>}
        </GlassCard>
      );
    })}
  </div>);
}

// ── PROGRESS SCREEN ───────────────────────────────────────────────
function ProgressScreen({cats,streak,xp,days,scores}){
  const all=cats.flatMap(c=>c.habits),done=all.filter(h=>h.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const lv=getLv(xp);
  const ws=[...scores.slice(-6),pct];
  const hc=v=>v>=90?T.gold:v>=70?`${T.sapphire}AA`:v>=50?`${T.sapphire}55`:v>0?`${T.violet}33`:'rgba(255,255,255,0.04)';
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const best=scores.length?Math.max(...scores,pct):pct;
  const ringColor=pct>=80?T.gold:pct>=50?T.sapphire:T.violet;

  return(<div style={{flex:1,overflowY:'auto',padding:'20px 16px 100px'}}>
    <div style={{fontSize:28,fontWeight:800,color:T.t1,letterSpacing:'-0.5px',marginBottom:4}}>Progress</div>
    <div style={{fontSize:12,fontWeight:400,color:T.t3,marginBottom:20}}>{new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>

    {/* Main Score */}
    <GlassCard glow glowColor={ringColor} style={{padding:24,marginBottom:14,textAlign:'center'}}>
      <div style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:18}}>Discipline Score™</div>
      <div style={{display:'flex',justifyContent:'center',position:'relative',marginBottom:16}}>
        <Ring pct={pct} size={136} sw={9} color={ringColor} glow={pct>0}/>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:46,fontWeight:800,color:ringColor,lineHeight:1,letterSpacing:'-2px'}}>{pct}</div>
          <div style={{fontSize:11,color:T.t3,letterSpacing:'0.04em'}}>/100</div>
        </div>
      </div>
      <div style={{display:'inline-block',fontSize:12,fontWeight:600,color:T.violet,
        background:T.vF,border:`1px solid ${T.vB}`,padding:'5px 16px',borderRadius:100}}>
        Level {lv.n} — {lv.t}
      </div>
    </GlassCard>

    {/* Stats */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
      {[
        {l:'Streak',   v:streak===0?'Day 1':`${streak}d`,  icon:'🔥',c:T.gold},
        {l:'Active',   v:days===0?'Today':days+' days',    icon:'📅',c:T.violet},
        {l:'Avg Score',v:avg?`${avg}%`:'—',                icon:'📊',c:T.sapphire},
        {l:'Best Day', v:best?`${best}%`:'—',              icon:'🏆',c:T.green},
      ].map(s=>(
        <GlassCard key={s.l} style={{padding:16}}>

// ── STUDY TIMER ───────────────────────────────────────────────────
const STUDY_BLOCKS=[
  {id:'morning',label:'Morning Block',start:'09:00',duration:60,breakEvery:45,breakDur:10},
  {id:'afternoon',label:'Afternoon Block',start:'14:00',duration:60,breakEvery:45,breakDur:10},
  {id:'night',label:'Night Block',start:'20:00',duration:60,breakEvery:45,breakDur:10},
  {id:'custom',label:'Custom',start:'',duration:60,breakEvery:25,breakDur:5},
];

function PomodoroScreen(){
  const[block,setBlock]=useState('morning');
  const[mode,setMode]=useState('focus'); // focus | break | rest
  const[running,setRunning]=useState(false);
  const[secs,setSecs]=useState(60*60);
  const[sessions,setSessions]=useState(0);
  const[showBreakSettings,setShowBreakSettings]=useState(false);
  const ir=useRef(null);

  const currentBlock=STUDY_BLOCKS.find(b=>b.id===block)||STUDY_BLOCKS[0];
  const tots={focus:currentBlock.duration*60,break:currentBlock.breakDur*60,rest:15*60};
  const tot=tots[mode],pct=((tot-secs)/tot)*100;
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  useEffect(()=>{
    if(running){
      ir.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){
            setRunning(false);
            if(mode==='focus')setSessions(p=>Math.min(8,p+1));
            return tots[mode];
          }
          return s-1;
        });
      },1000);
    }
    return()=>clearInterval(ir.current);
  },[running,mode,block]);

  const switchBlock=b=>{setBlock(b);setSecs(STUDY_BLOCKS.find(x=>x.id===b).duration*60);setRunning(false);setMode('focus');};
  const switchMode=m=>{setMode(m);setSecs(tots[m]);setRunning(false);};

  // Ring color: violet when focus, sapphire for break
  const ringColor=mode==='focus'?T.violet:mode==='break'?T.sapphire:T.green;
  const modeLabel=mode==='focus'?'Deep Focus':mode==='break'?'Short Break':'Rest';

  return(<div style={{flex:1,display:'flex',flexDirection:'column',padding:'20px 16px 100px',overflowY:'auto'}}>
    <div style={{fontSize:28,fontWeight:800,color:T.t1,letterSpacing:'-0.5px',marginBottom:6}}>Study Timer</div>
    <div style={{fontSize:12,color:T.t3,marginBottom:24,fontWeight:400}}>Focus Mode — {currentBlock.label}</div>

    {/* Study block selector — pill buttons */}
    <div style={{display:'flex',gap:8,marginBottom:28,overflowX:'auto',paddingBottom:4}}>
      {STUDY_BLOCKS.map(b=>{
        const on=block===b.id;
        return(
          <div key={b.id} onClick={()=>switchBlock(b.id)}
            style={{flexShrink:0,padding:'9px 18px',borderRadius:100,cursor:'pointer',
              background:on?T.vF:'rgba(255,255,255,0.04)',
              border:`1px solid ${on?T.vB:'rgba(255,255,255,0.08)'}`,
              boxShadow:on?`0 0 16px ${T.violet}30`:'none',
              transition:'all 0.25s'}}>
            <div style={{fontSize:12,fontWeight:on?700:500,color:on?T.violet:T.t2,whiteSpace:'nowrap'}}>{b.label}</div>
            {b.start&&<div style={{fontSize:10,color:T.t3,marginTop:2}}>{b.start}</div>}
          </div>
        );
      })}
    </div>

    {/* Timer ring — the centerpiece */}
    <div style={{display:'flex',justifyContent:'center',position:'relative',marginBottom:32}}
      onClick={()=>setRunning(r=>!r)}>
      {/* Outer glow ring */}
      <div style={{
        position:'absolute',
        width:230,height:230,borderRadius:'50%',
        top:'50%',left:'50%',transform:'translate(-50%,-50%)',
        background:`radial-gradient(circle, ${ringColor}12 0%, transparent 70%)`,
        transition:'background 0.5s',
        pointerEvents:'none',
      }}/>
      <Ring pct={pct} size={220} sw={10} color={ringColor} glow={true}
        pulse={running&&mode==='focus'}/>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        {/* Mode label */}
        <div style={{fontSize:10,fontWeight:700,color:ringColor,letterSpacing:'0.16em',
          textTransform:'uppercase',marginBottom:8,opacity:0.8}}>{modeLabel}</div>
        {/* Time display */}
        <div style={{fontSize:58,fontWeight:800,color:T.t1,lineHeight:1,letterSpacing:'-3px',
          textShadow:running?`0 0 30px ${ringColor}60`:'none',transition:'text-shadow 0.5s'}}>{fmt(secs)}</div>
        <div style={{fontSize:12,fontWeight:400,color:T.t3,marginTop:10}}>
          {running?'Tap to pause':'Tap to start'}
        </div>
      </div>
    </div>

    {/* Session dots */}
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:8,marginBottom:28}}>
      <div style={{display:'flex',gap:6}}>
        {Array.from({length:Math.min(8,Math.max(4,sessions+2))}).map((_,i)=>(
          <div key={i} style={{width:i<sessions?10:8,height:i<sessions?10:8,borderRadius:'50%',
            background:i<sessions?T.violet:'rgba(255,255,255,0.08)',
            boxShadow:i<sessions?`0 0 6px ${T.violet}80`:'none',
            transition:'all 0.3s'}}/>
        ))}
      </div>
      <span style={{fontSize:11,fontWeight:500,color:T.t3,marginLeft:4}}>{sessions} sessions</span>
    </div>

    {/* Controls */}
    <div style={{display:'flex',gap:10,marginBottom:16}}>
      <GlassCard style={{flex:1,padding:0,overflow:'hidden'}}>
        <button onClick={()=>{setSecs(tots[mode]);setRunning(false);}}
          style={{width:'100%',padding:'14px',background:'transparent',border:'none',cursor:'pointer',
            fontSize:13,fontWeight:600,color:T.t2,fontFamily:F}}>↺ Reset</button>
      </GlassCard>
      <button onClick={()=>setRunning(r=>!r)}
        style={{flex:2,padding:'14px',borderRadius:14,border:'none',cursor:'pointer',
          background:running?`${ringColor}CC`:ringColor,
          boxShadow:`0 0 24px ${ringColor}60`,
          fontSize:14,fontWeight:700,color:'#0A0A12',fontFamily:F,
          transition:'all 0.25s',letterSpacing:'-0.2px'}}>
        {running?'⏸  Pause':'▶  Start'}
      </button>
    </div>

    {/* Mode switcher */}
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      {[{id:'focus',label:'Focus'},{id:'break',label:'Break'},{id:'rest',label:'Rest'}].map(m=>{
        const on=mode===m.id;
        return(<div key={m.id} onClick={()=>switchMode(m.id)}
          style={{flex:1,padding:'10px',borderRadius:12,textAlign:'center',cursor:'pointer',
            background:on?'rgba(255,255,255,0.06)':'transparent',
            border:`1px solid ${on?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.04)'}`,
            transition:'all 0.2s'}}>
          <div style={{fontSize:12,fontWeight:on?700:400,color:on?T.t1:T.t3}}>{m.label}</div>
          <div style={{fontSize:10,color:T.t3,marginTop:2}}>
            {m.id==='focus'?`${currentBlock.duration}m`:m.id==='break'?`${currentBlock.breakDur}m`:'15m'}
          </div>
        </div>);
      })}
    </div>

    {/* Break info */}
    <GlassCard style={{padding:14,display:'flex',alignItems:'center',gap:12}}>
      <div style={{width:36,height:36,borderRadius:10,background:T.vF,border:`1px solid ${T.vB}`,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>⚡</div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,color:T.violet}}>
          Break every {currentBlock.breakEvery} min · {currentBlock.breakDur} min rest
        </div>
        <div style={{fontSize:11,color:T.t3,marginTop:2}}>+25 XP per session · 4 sessions = +50 bonus</div>
      </div>
    </GlassCard>
  </div>);
}

  const fn=name.trim().split(' ')[0];
  const dow=getDOW();
  const totalH=pillars.reduce((a,p)=>a+HABITS[p].filter(h=>!h.days||h.days.includes(dow)).length,0);

  const ss=[
    // Welcome
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{fontSize:80,fontWeight:800,color:T.t1,letterSpacing:'-4px',lineHeight:1,marginBottom:12,
        textShadow:`0 0 40px ${T.violet}40`}}>DNY</div>
      <div style={{fontSize:11,fontWeight:500,color:T.t3,letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:40}}>
        Discipline · Next Level · You
      </div>
      <div style={{fontSize:15,fontWeight:400,color:T.t2,lineHeight:1.8,marginBottom:56,maxWidth:280}}>
        The premium discipline app built for people who take their whole life seriously.
      </div>
      <button onClick={()=>setStep(1)} style={{width:'100%',maxWidth:300,padding:'17px',borderRadius:100,
        background:T.violet,boxShadow:`0 0 30px ${T.violet}60`,border:'none',cursor:'pointer',
        fontSize:16,fontWeight:700,color:'#0A0A12',fontFamily:F,letterSpacing:'-0.2px'}}>
        Start Building →
      </button>
    </div>,
    // Name
    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'70px 28px 32px'}}>
      <div style={{fontSize:30,fontWeight:800,color:T.t1,letterSpacing:'-0.8px',marginBottom:8}}>What's your name?</div>
      <div style={{fontSize:13,fontWeight:400,color:T.t3,marginBottom:44}}>This is your app. We'll make it personal.</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" autoFocus
        style={{fontSize:28,fontWeight:700,color:T.t1,background:'transparent',border:'none',
          borderBottom:`2px solid ${name?T.violet:'rgba(255,255,255,0.1)'}`,
          outline:'none',padding:'12px 0',marginBottom:52,width:'100%',
          boxShadow:name?`0 1px 0 ${T.violet}50`:'none',transition:'all 0.2s',letterSpacing:'-0.5px'}}/>
      <button onClick={()=>name.trim()&&setStep(2)}
        style={{width:'100%',padding:'16px',borderRadius:100,border:'none',cursor:'pointer',
          background:name.trim()?T.violet:'rgba(255,255,255,0.06)',
          boxShadow:name.trim()?`0 0 24px ${T.violet}50`:'none',
          fontSize:15,fontWeight:700,color:name.trim()?'#0A0A12':T.t3,fontFamily:F,
          transition:'all 0.25s',letterSpacing:'-0.2px'}}>
        {name.trim()?`Let's go, ${fn} →`:'Enter your name first'}
      </button>
    </div>,
    // Pillars
    <div style={{flex:1,overflowY:'auto',padding:'50px 20px 32px'}}>
      <div style={{fontSize:28,fontWeight:800,color:T.t1,letterSpacing:'-0.5px',marginBottom:6}}>Pick your pillars</div>
      <div style={{fontSize:13,fontWeight:400,color:T.t3,marginBottom:24}}>Your habits are built from these. Choose all that apply.</div>
      {pl.map(p=>{const on=pillars.includes(p.id);return(
        <div key={p.id} onClick={()=>tp(p.id)}
          style={{display:'flex',alignItems:'center',gap:14,padding:'16px',borderRadius:18,marginBottom:10,
            cursor:'pointer',transition:'all 0.2s',
            background:on?`${p.color}10`:'rgba(255,255,255,0.03)',
            border:`1px solid ${on?`${p.color}44`:'rgba(255,255,255,0.07)'}`,
            boxShadow:on?`0 0 20px ${p.color}20`:'none'}}>
          <span style={{fontSize:26}}>{p.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600,color:on?p.color:T.t1}}>{p.label}</div>
            <div style={{fontSize:12,fontWeight:400,color:T.t3,marginTop:2}}>{p.sub}</div>
          </div>
          <div style={{width:22,height:22,borderRadius:7,transition:'all 0.2s',
            border:`1.5px solid ${on?p.color:'rgba(255,255,255,0.14)'}`,
            background:on?p.color:'transparent',
            boxShadow:on?`0 0 8px ${p.color}80`:'none',
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {on&&<svg width="11" height="8" viewBox="0 0 11 8"><path d="M1 4L4 7 10 1" fill="none" stroke="#0A0A12" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        </div>
      );})}
      <button onClick={()=>pillars.length>0&&setStep(3)}
        style={{width:'100%',marginTop:10,padding:'16px',borderRadius:100,border:'none',cursor:'pointer',
          background:pillars.length>0?T.violet:'rgba(255,255,255,0.06)',
          boxShadow:pillars.length>0?`0 0 24px ${T.violet}50`:'none',
          fontSize:15,fontWeight:700,color:pillars.length>0?'#0A0A12':T.t3,fontFamily:F,
          transition:'all 0.25s',letterSpacing:'-0.2px'}}>
        {pillars.length>0?`Build My Checklist (${pillars.length} pillars) →`:'Select at least 1 pillar'}
      </button>
    </div>,
    // Go live
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{marginBottom:28,position:'relative'}}>
        <div style={{width:120,height:120,borderRadius:'50%',
          background:`radial-gradient(circle, ${T.violet}20 0%, transparent 70%)`,
          position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%) scale(1.5)',pointerEvents:'none'}}/>
        <svg width="120" height="120" viewBox="0 0 120 120" style={{transform:'rotate(-90deg)'}}>
          <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="8"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke={T.violet} strokeWidth="8"
            strokeDasharray={314} strokeDashoffset={314} strokeLinecap="round"/>
        </svg>
      </div>
      <div style={{fontSize:32,fontWeight:800,color:T.t1,letterSpacing:'-0.8px',marginBottom:10}}>Day 1 starts now, {fn}</div>
      <div style={{fontSize:15,fontWeight:600,color:T.violet,marginBottom:24}}>"Let's see what you're made of."</div>
      <GlassCard style={{padding:18,marginBottom:40,maxWidth:300,width:'100%'}}>
        <div style={{fontSize:13,color:T.t2,lineHeight:1.8}}>
          {pillars.length} pillars · {totalH} habits loaded<br/>
          Streak: 0 · Score: 0%<br/><br/>
          That ring is empty. Fill it.
        </div>
      </GlassCard>
      <button onClick={()=>onDone(name.trim(),pillars)}
        style={{width:'100%',maxWidth:300,padding:'17px',borderRadius:100,
          background:T.violet,boxShadow:`0 0 30px ${T.violet}60`,
          border:'none',cursor:'pointer',fontSize:16,fontWeight:700,
          color:'#0A0A12',fontFamily:F,letterSpacing:'-0.2px'}}>
        Open My Checklist →
      </button>
    </div>,
  ];
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg}}>
    {step>0&&step<ss.length-1&&(
      <div style={{padding:'52px 20px 0',flexShrink:0}}>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {ss.slice(1,-1).map((_,i)=>(
            <div key={i} style={{flex:1,height:2,borderRadius:1,
              background:i<step?T.violet:'rgba(255,255,255,0.08)',
              boxShadow:i<step?`0 0 6px ${T.violet}80`:'none',
              transition:'all 0.3s'}}/>
          ))}
        </div>
        <div onClick={()=>setStep(s=>Math.max(0,s-1))}
          style={{fontSize:13,fontWeight:500,color:T.t3,cursor:'pointer',display:'inline-block'}}>← Back</div>
      </div>
    )}
    {ss[step]}
  </div>);
}

// ── NAV ───────────────────────────────────────────────────────────
const NAV=[
  {id:'today',   label:'Today',   d:['M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z','M9 22V12h6v10']},
  {id:'progress',label:'Progress',d:['M18 20V10','M12 20V4','M6 20v-6']},
  {id:'pomodoro',label:'Focus',   d:['M12 2a10 10 0 100 20A10 10 0 0012 2z','M12 6v6l4 2']},
  {id:'journal', label:'Journal', d:['M12 20h9','M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z']},
  {id:'profile', label:'Profile', d:['M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2','M12 11a4 4 0 100-8 4 4 0 000 8z']},
];

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(()=>ld('dny_u2',null));
  const[tab,setTab]=useState('today');

  const getInit=()=>{
    const last=ld('dny_lastdate2',''),today=todayStr();
    if(last&&last!==today){
      const r=processNewDay();
      if(r)return{streak:r.newStreak,scores:r.newScores,days:r.newDays,journalDone:false};
    }
    return{streak:ld('dny_str2',0),scores:ld('dny_s2',[]),days:ld('dny_days2',0),journalDone:ld('dny_jd2',false)};
  };
  const init=getInit();
  const[streak,setStreak]=useState(init.streak);
  const[scores,setScores]=useState(init.scores);
  const[days,setDays]=useState(init.days);
  const[journalDone,setJournalDone]=useState(init.journalDone);
  const[xp,setXp]=useState(()=>ld('dny_xp2',0));
  const[cats,setCats]=useState(()=>{
    const u=ld('dny_u2',null);if(!u)return[];
    const s=ld('dny_c2',null);
    const today=todayStr();
    if(s&&s.date===today)return s.cats;
    const nc=mkCats(u.pillars);sv('dny_c2',{date:today,cats:nc});return nc;
  });

  useEffect(()=>{if(!ld('dny_lastdate2',''))sv('dny_lastdate2',todayStr());},[]);
  useEffect(()=>{
    const check=()=>{
      const last=ld('dny_lastdate2',''),today=todayStr();
      if(last&&last!==today){
        const r=processNewDay();
        if(r){
          setStreak(r.newStreak);setScores(r.newScores);setDays(r.newDays);setJournalDone(false);
          const u=ld('dny_u2',null);
          if(u){const nc=mkCats(u.pillars);setCats(nc);sv('dny_c2',{date:today,cats:nc});}
        }
      }
    };
    window.addEventListener('focus',check);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)check();});
    return()=>window.removeEventListener('focus',check);
  },[]);
  useEffect(()=>{
    if(cats.length>0){
      sv('dny_c2',{date:todayStr(),cats});
      const all=cats.flatMap(c=>c.habits);
      sv('dny_lastscore2',all.length?Math.round(all.filter(h=>h.done).length/all.length*100):0);
    }
  },[cats]);

  const toggle=useCallback((cid,hid)=>{
    setCats(prev=>{
      const was=prev.find(c=>c.id===cid)?.habits.find(h=>h.id===hid)?.done;
      const next=prev.map(c=>c.id!==cid?c:{...c,habits:c.habits.map(h=>h.id!==hid?h:{...h,done:!h.done})});
      setXp(x=>{const nx=was?Math.max(0,x-10):x+10;sv('dny_xp2',nx);return nx;});
      return next;
    });
  },[]);

  const handleJournalDone=useCallback(()=>{
    setJournalDone(true);sv('dny_jd2',true);
    setXp(x=>{const nx=x+20;sv('dny_xp2',nx);return nx;});
  },[]);

  const handleOnboard=(name,pillars)=>{
    const u={name,pillars};sv('dny_u2',u);
    sv('dny_days2',1);sv('dny_lastdate2',todayStr());sv('dny_lastscore2',0);
    setStreak(0);setScores([]);setDays(1);setJournalDone(false);
    const nc=mkCats(pillars);setCats(nc);sv('dny_c2',{date:todayStr(),cats:nc});
    setUser(u);
  };

  if(!user)return <Onboarding onDone={handleOnboard}/>;

  const journalBadge=!journalDone&&new Date().getHours()>=18;
  const screens={
    today:   <TodayScreen cats={cats} onToggle={toggle} name={user.name} streak={streak} journalDone={journalDone}/>,
    progress:<ProgressScreen cats={cats} streak={streak} xp={xp} days={days} scores={scores}/>,
    pomodoro:<PomodoroScreen/>,
    journal: <JournalScreen onJournalDone={handleJournalDone} journalDone={journalDone}/>,
    profile: <ProfileScreen name={user.name} streak={streak} xp={xp} days={days} cats={cats}/>,
  };

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg,maxWidth:480,margin:'0 auto'}}>
    {/* Safe area top */}
    <div style={{height:'env(safe-area-inset-top,44px)',background:T.bg1,flexShrink:0}}/>
    {/* Top bar */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'10px 20px 10px',
      background:T.bg1,flexShrink:0,
      borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
      <div style={{fontSize:20,fontWeight:800,color:T.t1,letterSpacing:'-0.5px'}}>DNY</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,
          background:T.goF,border:`1px solid ${T.goB}`,
          borderRadius:100,padding:'5px 12px'}}>
          <span style={{fontSize:13}}>🔥</span>
          <span style={{fontSize:12,fontWeight:700,color:T.gold}}>{streak===0?'Start':streak}</span>
        </div>
        <div onClick={()=>setTab('profile')}
          style={{width:32,height:32,borderRadius:10,cursor:'pointer',
            background:`linear-gradient(135deg,${T.violet},${T.sapphire})`,
            boxShadow:`0 0 12px ${T.violet}50`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>💪</div>
      </div>
    </div>
    {/* Screen */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{screens[tab]}</div>
    {/* Bottom nav */}
    <div style={{
      display:'flex',
      background:T.bg1,
      borderTop:'1px solid rgba(255,255,255,0.05)',
      padding:'10px 0',
      paddingBottom:'max(10px,env(safe-area-inset-bottom))',
      flexShrink:0,
    }}>
      {NAV.map(item=>{
        const on=tab===item.id;
        const color=on?T.violet:T.t3;
        return(
          <div key={item.id} onClick={()=>setTab(item.id)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
              gap:4,cursor:'pointer',padding:'4px 0',userSelect:'none',position:'relative'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color}
              strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
              style={{transition:'stroke 0.2s',filter:on?`drop-shadow(0 0 4px ${T.violet}CC)`:'none'}}>
              {item.d.map((p,i)=><path key={i} d={p}/>)}
            </svg>
            <span style={{fontSize:10,fontWeight:on?700:400,color,transition:'color 0.2s'}}>{item.label}</span>
            {on&&<div style={{width:4,height:4,borderRadius:2,background:T.violet,marginTop:-2,
              boxShadow:`0 0 6px ${T.violet}`}}/>}
            {item.id==='journal'&&journalBadge&&!on&&(
              <div style={{position:'absolute',top:2,right:'50%',transform:'translateX(8px)',
                width:7,height:7,borderRadius:'50%',background:T.violet,
                boxShadow:`0 0 6px ${T.violet}`}}/>
            )}
          </div>
        );
      })}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
