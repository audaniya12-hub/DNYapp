<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06060F"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DNY"/>
<title>DNY — Discipline. Next Level. You.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;overflow:hidden;}
body{background:#06060F;color:#EEECEA;font-family:'Inter',system-ui,sans-serif;}
::-webkit-scrollbar{display:none;}
textarea,input{caret-color:#E9A832;}
textarea::placeholder,input::placeholder{color:#4E4D60;}
textarea{font-family:'Inter',system-ui,sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useCallback,useEffect,useRef}=React;
const C={bg0:'#06060F',bg1:'#0C0C1A',bg2:'#111122',bg3:'#181830',bg4:'#1F1F38',b1:'rgba(255,255,255,0.06)',b2:'rgba(255,255,255,0.10)',b3:'rgba(255,255,255,0.16)',gold:'#E9A832',goldF:'rgba(233,168,50,0.10)',goldB:'rgba(233,168,50,0.22)',teal:'#0FD4B8',tealF:'rgba(15,212,184,0.10)',purple:'#9880F5',purpleF:'rgba(152,128,245,0.10)',green:'#22D57A',greenF:'rgba(34,213,122,0.10)',t1:'#EEECEA',t2:'#8A8899',t3:'#4E4D60'};
const Fd="'Cormorant Garamond',Georgia,serif";
const Fb="'Inter',system-ui,sans-serif";
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const HABITS={
  faith:[{id:'fajr',label:'Fajr Prayer',note:'Dawn'},{id:'dhuhr',label:'Dhuhr Prayer',note:'Midday'},{id:'asr',label:'Asr Prayer',note:'Afternoon'},{id:'maghrib',label:'Maghrib Prayer',note:'Sunset'},{id:'isha',label:'Isha Prayer',note:'Night'},{id:'quran',label:'Read Quran',note:'30 min'},{id:'mulk',label:'Surah Al-Mulk',note:'Before sleep'}],
  study:[{id:'am',label:'Morning Study Block',note:'2 hrs'},{id:'pm',label:'Afternoon Session',note:'2–3 hrs'},{id:'nr',label:'Night Review',note:'1 hr'},{id:'rd',label:'Read 20 Pages',note:'Non-textbook'}],
  body:[{id:'wk',label:'Workout',note:'4×/week'},{id:'wt',label:'Drink 2L Water',note:'Daily'},{id:'sl',label:'Sleep by 11 PM',note:'7–8 hrs'},{id:'sk',label:'Skincare Routine',note:'AM + PM'}],
  mind:[{id:'md',label:'Meditation',note:'10 min'},{id:'jn',label:'Daily Journal',note:'Evening'},{id:'gr',label:'Gratitude Practice',note:'3 things'}],
  life:[{id:'cs',label:'Cold Shower',note:'Morning'},{id:'cl',label:'Clean Space',note:'Daily'},{id:'pl',label:'Plan Tomorrow',note:'Before sleep'},{id:'np',label:'No Phone First 30m',note:'After waking'}],
};
const META={
  faith:{label:'Faith & Spirit',icon:'🕌',color:'#9880F5',faint:'rgba(152,128,245,0.10)'},
  study:{label:'Mind & Study',icon:'📚',color:'#0FD4B8',faint:'rgba(15,212,184,0.10)'},
  body:{label:'Body & Health',icon:'💪',color:'#22D57A',faint:'rgba(34,213,122,0.10)'},
  mind:{label:'Mental Wellness',icon:'🧘',color:'#4DA6FF',faint:'rgba(77,166,255,0.10)'},
  life:{label:'Life & Discipline',icon:'✅',color:'#E9A832',faint:'rgba(233,168,50,0.10)'},
};
const mkCats=ps=>ps.map(p=>({id:p,...META[p],habits:HABITS[p].map(h=>({...h,done:false}))}));
const LEVELS=[{n:1,t:'Beginner',xp:0},{n:2,t:'Committed',xp:100},{n:3,t:'Consistent',xp:300},{n:4,t:'Disciplined',xp:600},{n:5,t:'Focused',xp:1000},{n:6,t:'Elite',xp:1500},{n:7,t:'Warrior',xp:2200},{n:8,t:'Unstoppable',xp:3000},{n:9,t:'Legendary',xp:4000},{n:10,t:'Master',xp:5500}];
const getLv=xp=>{let lv=LEVELS[0];for(const l of LEVELS){if(xp>=l.xp)lv=l;}const i=LEVELS.indexOf(lv);const nx=LEVELS[i+1];return{...lv,nxp:nx?nx.xp:lv.xp+2000,nt:nx?.t};};

function Ring({pct,size=110,sw=10,color=C.gold}){
  const r=(size-sw)/2,c=2*Math.PI*r;
  return(<svg width={size} height={size} style={{transform:'rotate(-90deg)',flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={sw}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1),stroke 0.4s'}}/>
  </svg>);
}

function TodayScreen({cats,onToggle,name,streak}){
  const[open,setOpen]=useState(null);
  const all=cats.flatMap(c=>c.habits),done=all.filter(h=>h.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const rc=pct>=80?C.gold:pct>=50?C.teal:C.purple;
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const h=new Date().getHours();
  const gr=h<12?'Good Morning':h<17?'Good Afternoon':'Good Evening';
  const fn=name.trim().split(' ')[0];
  const msg=pct===100?'🔱 Flawless. You are elite.':pct>=80?'🔥 Excellent discipline today.':pct>=50?'⚡ Strong effort. Keep pushing.':'🌅 Rise. Your discipline is waiting.';
  return(<div style={{flex:1,overflowY:'auto',padding:'0 16px 100px'}}>
    <div style={{padding:'16px 0 14px'}}>
      <div style={{fontFamily:Fb,fontSize:11,color:C.t3,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>{today}</div>
      <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:C.t1}}>{gr}, {fn}</div>
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b2}`,borderRadius:22,padding:18,marginBottom:16,display:'flex',alignItems:'center',gap:16}}>
      <div style={{position:'relative',flexShrink:0}}>
        <Ring pct={pct} size={110} sw={9} color={rc}/>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontFamily:Fd,fontSize:28,fontWeight:800,color:rc,lineHeight:1}}>{pct}%</div>
          <div style={{fontFamily:Fb,fontSize:10,color:C.t3,marginTop:2}}>done</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:Fd,fontSize:15,fontWeight:700,color:C.t1,marginBottom:4}}>Discipline Score</div>
        <div style={{fontFamily:Fb,fontSize:12.5,color:C.t2,lineHeight:1.55,marginBottom:12}}>{msg}</div>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:C.goldF,border:`1px solid ${C.goldB}`,padding:'5px 12px',borderRadius:20}}>
          <span style={{fontSize:14}}>🔥</span>
          <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:C.gold}}>{streak===0?'Start Your Streak':`${streak} Day Streak`}</span>
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
      {[{label:'Done',val:`${done}/${all.length}`,color:rc},{label:'Streak',val:streak===0?'Day 1':`${streak}d`,color:C.gold},{label:'Score',val:`${pct}%`,color:rc}].map(s=>(
        <div key={s.label} style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:14,padding:'12px 10px',textAlign:'center'}}>
          <div style={{fontFamily:Fd,fontSize:18,fontWeight:700,color:s.color}}>{s.val}</div>
          <div style={{fontFamily:Fb,fontSize:10.5,color:C.t3,marginTop:3}}>{s.label}</div>
        </div>
      ))}
    </div>
    <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:10}}>Today's Checklist</div>
    {cats.map(cat=>{
      const cd=cat.habits.filter(h=>h.done).length,io=open===cat.id;
      return(<div key={cat.id} style={{background:C.bg2,border:`1px solid ${C.b1}`,borderRadius:18,marginBottom:10,overflow:'hidden'}}>
        <div onClick={()=>setOpen(io?null:cat.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',cursor:'pointer'}}>
          <span style={{fontSize:18}}>{cat.icon}</span>
          <div style={{flex:1}}><div style={{fontFamily:Fb,fontSize:12.5,fontWeight:700,color:cat.color,letterSpacing:'0.04em',textTransform:'uppercase'}}>{cat.label}</div></div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:48,height:4,background:C.b1,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:2,background:cat.color,width:`${cat.habits.length?cd/cat.habits.length*100:0}%`,transition:'width 0.4s'}}/>
            </div>
            <span style={{fontFamily:Fb,fontSize:11,color:cd===cat.habits.length&&cat.habits.length?cat.color:C.t3,fontWeight:600,minWidth:28}}>{cd}/{cat.habits.length}</span>
            <span style={{color:C.t3,fontSize:14,transform:`rotate(${io?90:0}deg)`,transition:'transform 0.2s',display:'inline-block'}}>›</span>
          </div>
        </div>
        {io&&<div style={{borderTop:`1px solid ${C.b1}`}}>
          {cat.habits.map((h,i)=>(
            <div key={h.id} onClick={()=>onToggle(cat.id,h.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',cursor:'pointer',borderBottom:i<cat.habits.length-1?`1px solid ${C.b1}`:'none',background:h.done?`${cat.color}08`:'transparent',transition:'background 0.18s'}}>
              <div style={{width:24,height:24,borderRadius:8,flexShrink:0,border:h.done?'none':`1.5px solid ${C.b3}`,background:h.done?cat.color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.18s'}}>
                {h.done&&<svg width="12" height="9" viewBox="0 0 12 9"><path d="M1 4.5 4.5 8 11 1" fill="none" stroke={C.bg0} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:h.done?C.t3:C.t1,textDecoration:h.done?'line-through':'none',transition:'all 0.18s'}}>{h.label}</div>
                {h.note&&<div style={{fontFamily:Fb,fontSize:11,color:C.t3,marginTop:1}}>{h.note}</div>}
              </div>
              {h.done&&<span style={{fontSize:14,color:cat.color}}>✓</span>}
            </div>
          ))}
        </div>}
        {!io&&cd>0&&<div style={{padding:'0 16px 12px',display:'flex',gap:5}}>
          {cat.habits.slice(0,8).map(h=><div key={h.id} style={{width:8,height:8,borderRadius:4,background:h.done?cat.color:C.b1}}/>)}
        </div>}
      </div>);
    })}
  </div>);
}

function ProgressScreen({cats,streak,xp,days,scores}){
  const all=cats.flatMap(c=>c.habits),done=all.filter(h=>h.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const lv=getLv(xp);
  const ws=[...scores.slice(-6),pct];
  const hc=v=>v>=90?C.gold:v>=70?'rgba(233,168,50,.55)':v>=50?'rgba(233,168,50,.28)':v>0?'rgba(233,168,50,.10)':C.b1;
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  return(<div style={{flex:1,overflowY:'auto',padding:'16px 16px 100px'}}>
    <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:C.t1,marginBottom:4}}>Progress</div>
    <div style={{fontFamily:Fb,fontSize:12,color:C.t2,marginBottom:20}}>{new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
    <div style={{background:C.bg3,border:`1px solid ${C.b2}`,borderRadius:22,padding:22,marginBottom:14,textAlign:'center'}}>
      <div style={{fontFamily:Fb,fontSize:10,color:C.t3,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:16}}>Today's Score</div>
      <div style={{display:'flex',justifyContent:'center',position:'relative',marginBottom:14}}>
        <Ring pct={pct} size={130} sw={11} color={pct>=80?C.gold:pct>=50?C.teal:C.purple}/>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontFamily:Fd,fontSize:42,fontWeight:800,color:pct>=80?C.gold:pct>=50?C.teal:C.purple,lineHeight:1}}>{pct}</div>
          <div style={{fontFamily:Fb,fontSize:11,color:C.t3}}>/100</div>
        </div>
      </div>
      <div style={{display:'inline-block',fontFamily:Fb,fontSize:13,fontWeight:600,color:C.gold,background:C.goldF,border:`1px solid ${C.goldB}`,padding:'5px 16px',borderRadius:20}}>Level {lv.n} — {lv.t}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
      {[
        {l:'Streak',  v:streak===0?'Day 1':`${streak}d`,  icon:'🔥',c:C.gold},
        {l:'Active',  v:days===0?'Today!':days+' days',    icon:'📅',c:C.purple},
        {l:'Avg Score',v:avg?`${avg}%`:'—',                icon:'📊',c:C.teal},
        {l:'Total XP', v:xp,                               icon:'⚡',c:C.green},
      ].map(s=>(
        <div key={s.l} style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:16,padding:16}}>
          <div style={{fontSize:22,marginBottom:8}}>{s.icon}</div>
          <div style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
          <div style={{fontFamily:Fb,fontSize:11,color:C.t3,marginTop:3}}>{s.l}</div>
        </div>
      ))}
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16,marginBottom:14}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>Last 7 Days</div>
      {ws.every(v=>v===0)
        ?<div style={{fontFamily:Fb,fontSize:13,color:C.t3,textAlign:'center',padding:'20px 0'}}>Check habits daily — your chart builds here 📈</div>
        :<div style={{display:'flex',gap:6,alignItems:'flex-end',height:72}}>
          {ws.map((v,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{width:'100%',borderRadius:6,height:Math.max(4,Math.round(v/100*56)),background:i===6?C.teal:v>=80?C.gold:'rgba(233,168,50,.32)',transition:'height 0.5s'}}/>
              <div style={{fontFamily:Fb,fontSize:9,color:i===6?C.teal:C.t3}}>{i===6?'Today':'·'}</div>
            </div>
          ))}
        </div>
      }
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>Activity</div>
      {scores.length===0
        ?<div style={{fontFamily:Fb,fontSize:13,color:C.t3,textAlign:'center',padding:'16px 0'}}>Your heatmap fills as you build your streak 🔥</div>
        :<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {scores.map((v,i)=><div key={i} style={{width:20,height:20,borderRadius:4,background:hc(v),margin:2}}/>)}
        </div>
      }
    </div>
  </div>);
}

function PomodoroScreen(){
  const[mode,setMode]=useState('focus');
  const[running,setRunning]=useState(false);
  const[secs,setSecs]=useState(25*60);
  const[sessions,setSessions]=useState(0);
  const ir=useRef(null);
  const tots={focus:25*60,short:5*60,long:15*60};
  const tot=tots[mode],pct=((tot-secs)/tot)*100;
  const mc=mode==='focus'?C.teal:mode==='short'?C.gold:C.purple;
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  useEffect(()=>{
    if(running){ir.current=setInterval(()=>{setSecs(s=>{if(s<=1){setRunning(false);if(mode==='focus')setSessions(p=>Math.min(4,p+1));return tots[mode];}return s-1;});},1000);}
    return()=>clearInterval(ir.current);
  },[running,mode]);
  const sw=m=>{setMode(m);setSecs(tots[m]);setRunning(false);};
  return(<div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 16px 100px',overflowY:'auto'}}>
    <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:C.t1,marginBottom:20}}>Study Timer</div>
    <div style={{display:'flex',background:C.bg4,borderRadius:14,padding:3,marginBottom:28,gap:3}}>
      {[{id:'focus',label:'Focus',dur:'25m'},{id:'short',label:'Break',dur:'5m'},{id:'long',label:'Rest',dur:'15m'}].map(m=>(
        <div key={m.id} onClick={()=>sw(m.id)} style={{flex:1,padding:'10px 0',borderRadius:11,textAlign:'center',cursor:'pointer',background:mode===m.id?C.bg2:'transparent',border:`1px solid ${mode===m.id?C.b2:'transparent'}`,transition:'all 0.2s'}}>
          <div style={{fontFamily:Fb,fontSize:13,fontWeight:700,color:mode===m.id?mc:C.t3}}>{m.label}</div>
          <div style={{fontFamily:Fb,fontSize:10,color:C.t3,marginTop:1}}>{m.dur}</div>
        </div>
      ))}
    </div>
    <div style={{display:'flex',justifyContent:'center',position:'relative',marginBottom:28}} onClick={()=>setRunning(r=>!r)}>
      <Ring pct={pct} size={220} sw={14} color={mc}/>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontFamily:Fd,fontSize:52,fontWeight:800,color:C.t1,lineHeight:1}}>{fmt(secs)}</div>
        <div style={{fontFamily:Fb,fontSize:13,color:C.t2,marginTop:6}}>{running?'Tap to pause':'Tap to start'}</div>
      </div>
    </div>
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:10,marginBottom:24}}>
      {[0,1,2,3].map(i=><div key={i} style={{width:12,height:12,borderRadius:6,background:i<sessions?C.teal:C.b2,transition:'all 0.3s'}}/>)}
      <span style={{fontFamily:Fb,fontSize:12,color:C.t3,marginLeft:4}}>{sessions}/4 sessions</span>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:16}}>
      <button onClick={()=>{setSecs(tot);setRunning(false);}} style={{flex:1,padding:'14px',borderRadius:14,background:C.b1,border:`1px solid ${C.b2}`,cursor:'pointer',fontFamily:Fb,fontSize:13,fontWeight:600,color:C.t2}}>↺ Reset</button>
      <button onClick={()=>setRunning(r=>!r)} style={{flex:2,padding:'14px',borderRadius:14,border:'none',cursor:'pointer',background:mc,fontFamily:Fd,fontSize:15,fontWeight:700,color:C.bg0}}>{running?'⏸ Pause':'▶ Start'}</button>
    </div>
    <div style={{background:C.tealF,border:`1px solid rgba(15,212,184,0.2)`,borderRadius:14,padding:14,display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:22}}>⚡</span>
      <div><div style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:C.teal}}>+25 XP per focus session</div><div style={{fontFamily:Fb,fontSize:11.5,color:C.t3,marginTop:2}}>4 sessions = bonus +50 XP</div></div>
    </div>
  </div>);
}

function JournalScreen(){
  const[mood,setMood]=useState(null);
  const[entry,setEntry]=useState('');
  const[grat,setGrat]=useState('');
  const[saved,setSaved]=useState(false);
  const ps=["What habit did you resist most today — and what does that reveal about you?","Name one moment today where you chose discipline over comfort.","What would your most disciplined self say about today's effort?","Where did you lose focus today, and what was the trigger?","What's one thing you did today that your future self will thank you for?","What are you genuinely proud of from today?","If today had a discipline score out of 10, what would it be and why?"];
  const p=ps[new Date().getDay()%ps.length];
  return(<div style={{flex:1,overflowY:'auto',padding:'16px 16px 100px'}}>
    <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:C.t1,marginBottom:4}}>Reflection</div>
    <div style={{fontFamily:Fb,fontSize:12,color:C.t2,marginBottom:20}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
    <div style={{background:'linear-gradient(135deg,rgba(152,128,245,.13),rgba(15,212,184,.07))',border:`1px solid rgba(152,128,245,.22)`,borderRadius:20,padding:20,marginBottom:14}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.purple,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:12}}>Today's Prompt</div>
      <div style={{fontFamily:Fb,fontSize:15,fontWeight:500,color:C.t1,lineHeight:1.65}}>"{p}"</div>
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16,marginBottom:14}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:14}}>How was your day?</div>
      <div style={{display:'flex',gap:6}}>
        {['😔','😐','🙂','😊','🤩'].map((m,i)=>(
          <div key={i} onClick={()=>setMood(i)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5,padding:'10px 0',borderRadius:12,cursor:'pointer',background:mood===i?C.tealF:'transparent',border:`1px solid ${mood===i?C.teal:'transparent'}`,transition:'all 0.18s'}}>
            <span style={{fontSize:22}}>{m}</span>
            <span style={{fontFamily:Fb,fontSize:9.5,color:mood===i?C.teal:C.t3}}>{'Rough,Meh,Okay,Good,Elite'.split(',')[i]}</span>
          </div>
        ))}
      </div>
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16,marginBottom:14}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:12}}>Free Write</div>
      <textarea value={entry} onChange={e=>setEntry(e.target.value)} rows={5} placeholder="Write anything about your day..." style={{width:'100%',resize:'none',background:C.bg1,border:`1px solid ${C.b1}`,borderRadius:12,padding:14,color:C.t1,fontSize:14,outline:'none',boxSizing:'border-box',lineHeight:1.65}}/>
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16,marginBottom:20}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:6}}>Gratitude</div>
      <div style={{fontFamily:Fb,fontSize:12,color:C.t3,marginBottom:12}}>Today I am grateful for...</div>
      <textarea value={grat} onChange={e=>setGrat(e.target.value)} rows={3} placeholder="e.g. The focus I had during my morning study block..." style={{width:'100%',resize:'none',background:C.bg1,border:`1px solid ${C.b1}`,borderRadius:12,padding:14,color:C.t1,fontSize:14,outline:'none',boxSizing:'border-box',lineHeight:1.65}}/>
    </div>
    <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',cursor:'pointer',background:saved?C.green:C.gold,fontFamily:Fd,fontSize:15,fontWeight:700,color:C.bg0,transition:'background 0.3s'}}>
      {saved?'✓ Saved':'Complete Reflection'}
    </button>
  </div>);
}

function ProfileScreen({name,streak,xp,days,cats}){
  const lv=getLv(xp);
  const pp=Math.min(100,Math.round((xp-lv.xp)/(lv.nxp-lv.xp)*100));
  const fn=name.trim().split(' ')[0];
  const all=cats.flatMap(c=>c.habits),done=all.filter(h=>h.done).length;
  const badges=[];
  if(days>=1)       badges.push({icon:'🌱',label:'Day 1 Complete',color:C.green});
  if(streak>=3)     badges.push({icon:'🔥',label:'3-Day Streak',color:C.gold});
  if(streak>=7)     badges.push({icon:'⚡',label:'7-Day Streak',color:C.gold});
  if(streak>=14)    badges.push({icon:'💎',label:'14-Day Streak',color:C.teal});
  if(streak>=30)    badges.push({icon:'👑',label:'30-Day Streak',color:C.purple});
  if(xp>=100)       badges.push({icon:'⭐',label:'100 XP Club',color:C.gold});
  if(xp>=500)       badges.push({icon:'🏆',label:'500 XP Club',color:C.gold});
  if(done===all.length&&all.length>0) badges.push({icon:'🔱',label:'Perfect Day',color:C.purple});
  return(<div style={{flex:1,overflowY:'auto',padding:'16px 16px 100px'}}>
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:24,paddingTop:8}}>
      <div style={{width:80,height:80,borderRadius:24,background:`linear-gradient(135deg,${C.purple},${C.teal})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,marginBottom:12}}>💪</div>
      <div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:C.t1}}>{name||'Warrior'}</div>
      <div style={{fontFamily:Fb,fontSize:13,color:C.t2,marginTop:4}}>Level {lv.n} — {lv.t}</div>
      <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap',justifyContent:'center'}}>
        <div style={{background:C.goldF,border:`1px solid ${C.goldB}`,borderRadius:20,padding:'4px 14px',fontFamily:Fb,fontSize:12,fontWeight:700,color:C.gold}}>
          {streak===0?'🌱 Start Your Streak':`🔥 ${streak} Day Streak`}
        </div>
      </div>
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b2}`,borderRadius:20,padding:20,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontFamily:Fb,fontSize:12,color:C.t2}}>Level {lv.n} → Level {lv.n+1}</div>
        <div style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:C.gold}}>{xp} XP</div>
      </div>
      <div style={{height:8,background:C.b1,borderRadius:4,overflow:'hidden',marginBottom:8}}>
        <div style={{height:'100%',background:`linear-gradient(90deg,${C.gold},${C.teal})`,borderRadius:4,width:`${pp}%`,transition:'width 1s'}}/>
      </div>
      <div style={{fontFamily:Fb,fontSize:11,color:C.t3}}>{lv.nxp-xp} XP to {lv.nt||'Max Level'}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
      {[
        {label:'Streak',     val:streak===0?'—':`${streak}d`, color:C.gold},
        {label:'Days Active',val:days===0?'New!':days,        color:C.teal},
        {label:'Done Today', val:`${done}/${all.length}`,     color:C.purple},
      ].map(s=>(
        <div key={s.label} style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:14,padding:'14px 10px',textAlign:'center'}}>
          <div style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:s.color}}>{s.val}</div>
          <div style={{fontFamily:Fb,fontSize:10.5,color:C.t3,marginTop:3}}>{s.label}</div>
        </div>
      ))}
    </div>
    <div style={{background:C.bg3,border:`1px solid ${C.b1}`,borderRadius:18,padding:16}}>
      <div style={{fontFamily:Fb,fontSize:10,fontWeight:700,color:C.t3,letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:14}}>Badges Earned</div>
      {badges.length===0
        ?<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:36,marginBottom:10}}>🏅</div>
            <div style={{fontFamily:Fb,fontSize:13,color:C.t3,lineHeight:1.65}}>Complete habits every day to unlock badges, {fn}.<br/>Your first one is closer than you think.</div>
          </div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {badges.map(b=>(
              <div key={b.label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'12px 8px',background:C.bg4,borderRadius:14}}>
                <span style={{fontSize:26}}>{b.icon}</span>
                <span style={{fontFamily:Fb,fontSize:10,color:b.color,textAlign:'center',fontWeight:600,lineHeight:1.4}}>{b.label}</span>
              </div>
            ))}
          </div>
      }
    </div>
  </div>);
}

function Onboarding({onDone}){
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');
  const[pillars,setPillars]=useState([]);
  const tp=id=>setPillars(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const pl=[
    {id:'faith',icon:'🕌',label:'Faith & Spirit',sub:'Prayers, Quran, spiritual habits',color:C.purple},
    {id:'study',icon:'📚',label:'Mind & Study',sub:'Study blocks, reading, deep work',color:C.teal},
    {id:'body',icon:'💪',label:'Body & Health',sub:'Workout, water, sleep, skincare',color:C.green},
    {id:'mind',icon:'🧘',label:'Mental Wellness',sub:'Meditation, journaling, gratitude',color:'#4DA6FF'},
    {id:'life',icon:'✅',label:'Life & Discipline',sub:'Cold shower, clean space, planning',color:C.gold},
  ];
  const fn=name.trim().split(' ')[0];
  const totalHabits=pillars.reduce((a,p)=>a+HABITS[p].length,0);
  const ss=[
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{fontFamily:Fd,fontSize:72,fontWeight:800,color:C.t1,letterSpacing:'-0.04em',lineHeight:1,marginBottom:8}}>DNY<span style={{color:C.gold}}>.</span></div>
      <div style={{fontFamily:Fb,fontSize:11,color:C.t2,letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:32}}>Discipline · Next Level · You</div>
      <div style={{fontFamily:Fb,fontSize:15,color:C.t2,lineHeight:1.75,marginBottom:48,maxWidth:300}}>The app built for people who take their whole life seriously.</div>
      <button onClick={()=>setStep(1)} style={{width:'100%',maxWidth:300,padding:'17px',borderRadius:16,background:C.gold,border:'none',cursor:'pointer',fontFamily:Fd,fontSize:16,fontWeight:700,color:C.bg0}}>Start Building →</button>
    </div>,
    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'60px 28px 32px'}}>
      <div style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:C.t1,marginBottom:8}}>What's your name?</div>
      <div style={{fontFamily:Fb,fontSize:13,color:C.t2,marginBottom:40}}>This is your app. We'll make it personal.</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" autoFocus style={{fontFamily:Fd,fontSize:24,fontWeight:600,color:C.t1,background:'transparent',border:'none',borderBottom:`2px solid ${name?C.gold:C.b2}`,outline:'none',padding:'12px 0',marginBottom:48,width:'100%',transition:'border-color 0.2s'}}/>
      <button onClick={()=>name.trim()&&setStep(2)} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',cursor:'pointer',background:name.trim()?C.gold:C.b1,fontFamily:Fd,fontSize:15,fontWeight:700,color:name.trim()?C.bg0:C.t3,transition:'all 0.2s'}}>
        {name.trim()?`Let's go, ${fn} →`:'Enter your name first'}
      </button>
    </div>,
    <div style={{flex:1,overflowY:'auto',padding:'40px 20px 32px'}}>
      <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:C.t1,marginBottom:4}}>Pick your pillars</div>
      <div style={{fontFamily:Fb,fontSize:13,color:C.t2,marginBottom:24}}>Your habits will be built from these. Choose all that apply.</div>
      {pl.map(p=>{const on=pillars.includes(p.id);return(
        <div key={p.id} onClick={()=>tp(p.id)} style={{display:'flex',alignItems:'center',gap:14,padding:'15px 16px',borderRadius:16,marginBottom:10,cursor:'pointer',border:`1.5px solid ${on?p.color:C.b2}`,background:on?`${p.color}14`:C.bg4,transition:'all 0.18s'}}>
          <span style={{fontSize:26}}>{p.icon}</span>
          <div style={{flex:1}}><div style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:on?p.color:C.t1}}>{p.label}</div><div style={{fontFamily:Fb,fontSize:12,color:C.t2,marginTop:2}}>{p.sub}</div></div>
          <div style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${on?p.color:C.b2}`,background:on?p.color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.18s',flexShrink:0}}>
            {on&&<svg width="11" height="8" viewBox="0 0 11 8"><path d="M1 4 4.5 7 10 1" fill="none" stroke={C.bg0} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        </div>
      );})}
      <button onClick={()=>pillars.length>0&&setStep(3)} style={{width:'100%',marginTop:8,padding:'16px',borderRadius:16,border:'none',cursor:'pointer',background:pillars.length>0?C.gold:C.b1,fontFamily:Fd,fontSize:15,fontWeight:700,color:pillars.length>0?C.bg0:C.t3,transition:'all 0.2s'}}>
        {pillars.length>0?`Build My Checklist (${pillars.length} pillars) →`:'Select at least 1 pillar'}
      </button>
    </div>,
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{marginBottom:28}}>
        <svg width="120" height="120" viewBox="0 0 120 120" style={{transform:'rotate(-90deg)'}}>
          <circle cx="60" cy="60" r="50" fill="none" stroke={C.b2} strokeWidth="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke={C.gold} strokeWidth="10" strokeDasharray={314} strokeDashoffset={314} strokeLinecap="round"/>
        </svg>
      </div>
      <div style={{fontFamily:Fd,fontSize:28,fontWeight:800,color:C.t1,marginBottom:10}}>Day 1 starts now, {fn}.</div>
      <div style={{fontFamily:Fb,fontSize:16,color:C.gold,fontWeight:600,marginBottom:24}}>"Let's see what you're made of."</div>
      <div style={{background:C.goldF,border:`1px solid ${C.goldB}`,borderRadius:16,padding:18,marginBottom:36,maxWidth:300}}>
        <div style={{fontFamily:Fb,fontSize:13,color:C.t2,lineHeight:1.7}}>{pillars.length} pillars · {totalHabits} habits loaded<br/>Streak: 0 · Score: 0%<br/><br/>That ring is empty. Fill it.</div>
      </div>
      <button onClick={()=>onDone(name.trim(),pillars)} style={{width:'100%',maxWidth:300,padding:'17px',borderRadius:16,background:C.gold,border:'none',cursor:'pointer',fontFamily:Fd,fontSize:16,fontWeight:700,color:C.bg0}}>Open My Checklist →</button>
    </div>,
  ];
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg0}}>
    {step>0&&step<ss.length-1&&(
      <div style={{padding:'52px 20px 0',flexShrink:0}}>
        <div style={{display:'flex',gap:6,marginBottom:14}}>{ss.slice(1,-1).map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<step?C.gold:C.b2,transition:'background 0.3s'}}/>)}</div>
        <div onClick={()=>setStep(s=>Math.max(0,s-1))} style={{fontFamily:Fb,fontSize:13,color:C.t3,cursor:'pointer',display:'inline-block'}}>← Back</div>
      </div>
    )}
    {ss[step]}
  </div>);
}

const NAV=[
  {id:'today',   label:'Today',   d:['M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z','M9 22V12h6v10']},
  {id:'progress',label:'Progress',d:['M18 20V10','M12 20V4','M6 20v-6']},
  {id:'pomodoro',label:'Focus',   d:['M12 2a10 10 0 100 20A10 10 0 0012 2z','M12 6v6l4 2']},
  {id:'journal', label:'Journal', d:['M12 20h9','M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z']},
  {id:'profile', label:'Profile', d:['M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2','M12 11a4 4 0 100-8 4 4 0 000 8z']},
];

function App(){
  const[user,setUser]=useState(()=>ld('dny_u2',null));
  const[tab,setTab]=useState('today');
  const[cats,setCats]=useState(()=>{
    const u=ld('dny_u2',null); if(!u)return[];
    const s=ld('dny_c2',null);
    return s&&s.date===new Date().toDateString()?s.cats:mkCats(u.pillars);
  });
  const[scores,setScores]=useState(()=>ld('dny_s2',[]));
  const[xp,setXp]=useState(()=>ld('dny_xp2',0));
  const[streak,setStreak]=useState(()=>ld('dny_str2',0));
  const[days,setDays]=useState(()=>ld('dny_days2',0));

  useEffect(()=>{if(cats.length>0)sv('dny_c2',{date:new Date().toDateString(),cats});},[cats]);

  const toggle=useCallback((cid,hid)=>{
    setCats(prev=>{
      const was=prev.find(c=>c.id===cid)?.habits.find(h=>h.id===hid)?.done;
      const next=prev.map(c=>c.id!==cid?c:{...c,habits:c.habits.map(h=>h.id!==hid?h:{...h,done:!h.done})});
      setXp(x=>{const nx=was?Math.max(0,x-10):x+10;sv('dny_xp2',nx);return nx;});
      return next;
    });
  },[]);

  const handleDone=(name,pillars)=>{
    const u={name,pillars}; sv('dny_u2',u);
    sv('dny_days2',1); setDays(1);
    const nc=mkCats(pillars);
    setCats(nc); sv('dny_c2',{date:new Date().toDateString(),cats:nc});
    setUser(u);
  };

  if(!user)return <Onboarding onDone={handleDone}/>;

  const screens={
    today:<TodayScreen cats={cats} onToggle={toggle} name={user.name} streak={streak}/>,
    progress:<ProgressScreen cats={cats} streak={streak} xp={xp} days={days} scores={scores}/>,
    pomodoro:<PomodoroScreen/>,
    journal:<JournalScreen/>,
    profile:<ProfileScreen name={user.name} streak={streak} xp={xp} days={days} cats={cats}/>,
  };

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg0,maxWidth:480,margin:'0 auto'}}>
    <div style={{height:'env(safe-area-inset-top,44px)',background:C.bg1,flexShrink:0}}/>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px 8px',background:C.bg1,flexShrink:0,borderBottom:`1px solid ${C.b1}`}}>
      <div style={{fontFamily:Fd,fontSize:18,fontWeight:800,color:C.t1,letterSpacing:'-0.02em'}}>DNY<span style={{color:C.gold}}>.</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{background:C.goldF,border:`1px solid ${C.goldB}`,borderRadius:20,padding:'4px 12px',display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:13}}>🔥</span>
          <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:C.gold}}>{streak===0?'Start':streak}</span>
        </div>
        <div onClick={()=>setTab('profile')} style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.purple},${C.teal})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,cursor:'pointer'}}>💪</div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{screens[tab]}</div>
    <div style={{display:'flex',background:C.bg1,borderTop:`1px solid ${C.b2}`,padding:'10px 0',paddingBottom:'max(10px,env(safe-area-inset-bottom))',flexShrink:0}}>
      {NAV.map(item=>{const on=tab===item.id,color=on?C.gold:C.t3;return(
        <div key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',padding:'4px 0',userSelect:'none'}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{transition:'stroke 0.18s'}}>
            {item.d.map((p,i)=><path key={i} d={p}/>)}
          </svg>
          <span style={{fontFamily:Fb,fontSize:10,fontWeight:on?700:400,color,transition:'color 0.18s'}}>{item.label}</span>
          {on&&<div style={{width:4,height:4,borderRadius:2,background:C.gold,marginTop:-2}}/>}
        </div>
      );})}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
